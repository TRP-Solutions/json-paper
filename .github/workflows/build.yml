name: Build + Release (Cross-platform)

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev

      # CMake (Windows + Linux)
      - name: Install latest CMake
        if: matrix.os != 'macos-latest'
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -S Emulator -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      # Test
      - name: Test macOS app
        if: matrix.os == 'macos-latest'
        run: |
          APP="build/e_paper_emulator.app"
          BIN="$APP/Contents/MacOS/e_paper_emulator"

          echo "Checking bundle..."
          test -d "$APP" || exit 1

          echo "Checking executable..."
          test -f "$BIN" || exit 1

          chmod +x "$BIN"

          echo "Trying to start app (ignore crash)..."
          timeout 5s "$BIN" || true

          echo "macOS test done"
          
      - name: Test Windows exe
        if: matrix.os == 'windows-latest'
        run: |
          $BIN = "build\\Release\\e_paper_emulator.exe"
          
          Write-Host "Checking executable..."
          if (!(Test-Path $BIN)) { exit 1 }
          
          Write-Host "Trying to start app (ignore crash)..."
          Start-Process $BIN
          
          Start-Sleep -Seconds 5
          
          Get-Process e_paper_emulator -ErrorAction SilentlyContinue | Stop-Process -Force
          
          Write-Host "Windows test done"

      - name: Test Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          BIN="build/e_paper_emulator"
          
          echo "Checking executable..."
          test -f "$BIN" || exit 1
          
          chmod +x "$BIN"
          
          echo "Trying to start app (ignore crash)..."
          timeout 5s "$BIN" || true
          
          echo "Linux test done"
      # Package per OS

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/e_paper_emulator.app \
            e_paper_emulator-macos.zip

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: |
          mkdir package
          copy build\Release\e_paper_emulator.exe package\
          powershell Compress-Archive -Path package\* -DestinationPath e_paper_emulator-windows.zip

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir package
          cp build/e_paper_emulator package/
          chmod +x package/e_paper_emulator
          zip -r e_paper_emulator-linux.zip package

      # upload artifacts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: |
            *.zip

      # create release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}