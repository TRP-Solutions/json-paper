name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      # Linux deps
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev

      # CMake
      - name: Install latest CMake
        if: matrix.os != 'macos-latest'
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -S Emulator -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release